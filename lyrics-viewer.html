<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>equalizer music band — Lyrics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&family=Noto+Sans+Sinhala:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--surface:#0f0f18;--border:#1e1e30;--text:#fff;--dim:rgba(255,255,255,.35);--accent:#ff3c5a;--accent2:#7c3aed;--green:#00e676;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-user-select:none;user-select:none}

#bg-image{position:fixed;inset:0;background-size:cover;background-position:center;z-index:0;opacity:0;transition:opacity .5s}
#bg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
#login-screen.hidden{display:none}
.login-box{background:#0f0f18;border:1px solid #2a2a3d;border-radius:20px;padding:36px 32px;width:360px;max-width:95vw;display:flex;flex-direction:column;gap:14px;align-items:center}
.login-band{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:5px;background:linear-gradient(90deg,#ff3c5a,#c850c0,#4158d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.login-sub{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:4px;color:rgba(255,255,255,.2);margin-top:-8px}
.login-divider{font-size:.7rem;color:rgba(255,255,255,.2);text-align:center;width:100%;position:relative}
.login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:rgba(255,255,255,.1)}
.login-divider::before{left:0}.login-divider::after{right:0}
.btn-google{width:100%;padding:11px;border-radius:10px;border:1px solid #2a2a3d;background:#1a1a2e;color:#fff;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.btn-google:hover{background:#252540}
.login-label{font-size:.7rem;color:rgba(255,255,255,.4);align-self:flex-start;letter-spacing:1px;text-transform:uppercase}
.login-input{width:100%;background:#0a0a14;border:1px solid #2a2a3d;color:#fff;padding:11px 14px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--accent2)}
.login-input::placeholder{color:rgba(255,255,255,.2)}
.btn-email-login{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(90deg,#ff3c5a,#c850c0);color:#fff;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.login-toggle{font-size:.75rem;color:rgba(255,255,255,.35);cursor:pointer;text-align:center}
.login-toggle span{color:var(--accent2);text-decoration:underline}
.login-error{font-size:.75rem;color:var(--accent);text-align:center;min-height:1em;opacity:0;transition:opacity .2s}
.login-error.show{opacity:1}

/* WAITING */
#waiting{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;z-index:10;transition:opacity .4s;padding:24px}
#waiting.hidden{opacity:0;pointer-events:none}
.wait-band{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,6vw,3.2rem);letter-spacing:5px;background:linear-gradient(90deg,#ff3c5a,#c850c0,#4158d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.wait-sub{font-family:'Space Mono',monospace;font-size:clamp(.6rem,1.8vw,.85rem);letter-spacing:5px;color:rgba(255,255,255,.2)}
.wait-text{font-size:clamp(.75rem,2.5vw,.9rem);color:rgba(255,255,255,.25);animation:pulsing 2s infinite;margin-top:4px}
.conn-badge{font-size:.7rem;padding:4px 14px;border-radius:20px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
.conn-badge.ok{color:var(--green);background:rgba(0,230,118,.1)}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 12px;font-size:.72rem;color:rgba(255,255,255,.4);cursor:pointer;margin-top:4px}
.user-chip img{width:20px;height:20px;border-radius:50%}
@keyframes pulsing{0%,100%{opacity:.2}50%{opacity:.6}}

/* MAIN */
#main{position:fixed;inset:0;display:none;flex-direction:column;z-index:2}
.song-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:max(12px,env(safe-area-inset-top,12px)) 16px 8px;opacity:0;transition:opacity .4s;min-height:52px}
.song-bar.show{opacity:1}
.song-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(.9rem,3.5vw,1.3rem);letter-spacing:2px;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw}
.song-artist{font-size:clamp(.6rem,2vw,.72rem);color:var(--dim);margin-top:1px}
.song-bar-right{display:flex;align-items:center;gap:8px}
.verse-counter{font-size:clamp(.6rem,2vw,.72rem);color:var(--dim);white-space:nowrap}

/* LYRICS */
.lyrics-area{flex:1;display:flex;align-items:center;justify-content:flex-start;padding:4px 20px 4px;overflow:hidden;position:relative}
.live-dot{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:0;animation:livepulse 1.5s infinite;transition:opacity .3s}
.live-dot.show{opacity:1}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(255,60,90,.6)}50%{box-shadow:0 0 0 5px rgba(255,60,90,0)}}
.lyrics-wrap{width:100%;transition:opacity .22s,transform .28s;overflow:hidden}
.lyrics-wrap.out{opacity:0;transform:translateY(-8px)}
.lyrics-wrap.in{opacity:1;transform:translateY(0)}

/* LYRIC LINE — tappable */
.lyric-line-wrap{position:relative;cursor:pointer;border-radius:4px;transition:background .15s}
.lyric-line-wrap:active{background:rgba(124,58,237,.12)}
.lyric-line{display:block;font-family:'Space Mono','Courier New',monospace;font-weight:500;line-height:1.4;color:var(--text);text-shadow:0 1px 12px rgba(0,0,0,.8);white-space:pre-wrap;word-break:break-word}
.lyric-line.spacer{height:.35em}

/* INLINE NOTE */
.inline-note{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(124,58,237,.12);
  border-left:3px solid var(--accent2);
  border-radius:0 8px 8px 0;
  padding:6px 10px 6px 10px;
  margin:2px 0 6px;
  font-family:'Inter',sans-serif;
  -webkit-user-select:text;user-select:text;
}
.inline-note-text{flex:1;font-size:.78rem;color:#c4b5fd;line-height:1.5;word-break:break-word}
.inline-note-del{background:none;border:none;color:rgba(255,60,90,.5);cursor:pointer;font-size:.85rem;padding:0 2px;flex-shrink:0;line-height:1}
.inline-note-del:active{color:var(--accent)}

/* BOTTOM BAR */
.bottom-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:6px 16px max(8px,env(safe-area-inset-bottom,8px));min-height:48px}
.font-controls{display:flex;gap:8px}
.font-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.font-btn:active{background:rgba(255,255,255,.25)}
.bottom-right{display:flex;gap:8px;align-items:center}
.playlist-btn{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#a78bfa;padding:5px 12px;border-radius:20px;font-size:.7rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.bg-toggle{display:flex;gap:6px;align-items:center}
.bg-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.bg-opt.active{border-color:var(--accent)}
.progress-bar{position:fixed;bottom:0;left:0;height:3px;background:var(--accent);transition:width .4s ease;width:0;z-index:20}

/* NOTE INPUT PANEL */
#note-panel{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.65)}
#note-panel.open{display:flex}
.note-box{background:#0f0f18;border:1px solid #2a2a3d;border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 20px max(20px,env(safe-area-inset-bottom,20px));display:flex;flex-direction:column;gap:12px}
.note-box-header{display:flex;align-items:center;justify-content:space-between}
.note-box-title{font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);font-family:'Space Mono',monospace}
.note-close{background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer;padding:4px}
.note-ref{font-size:.72rem;color:rgba(255,255,255,.3);font-family:'Space Mono',monospace;background:rgba(255,255,255,.05);padding:5px 10px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-textarea{background:#0a0a14;border:1px solid #2a2a3d;color:#fff;padding:12px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.88rem;line-height:1.6;resize:none;min-height:100px;max-height:200px;outline:none;-webkit-user-select:text;user-select:text;width:100%}
.note-textarea:focus{border-color:var(--accent2)}
.note-textarea::placeholder{color:rgba(255,255,255,.2)}
.note-save-btn{background:linear-gradient(90deg,var(--accent2),#5b21b6);color:#fff;border:none;padding:11px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;width:100%}

/* PLAYLIST PANEL */
#playlist-panel{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6)}
#playlist-panel.open{display:flex}
.playlist-box{background:#0f0f18;border:1px solid #2a2a3d;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;padding:0 0 max(16px,env(safe-area-inset-bottom,16px))}
.playlist-header{padding:18px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e30}
.playlist-header h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--accent2)}
.pl-close{background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer}
.playlist-list{flex:1;overflow-y:auto;padding:8px}
.playlist-list::-webkit-scrollbar{width:3px}
.playlist-list::-webkit-scrollbar-thumb{background:#2a2a3d;border-radius:3px}
.pl-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid transparent;transition:all .15s;margin-bottom:4px}
.pl-item-num{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--dim);min-width:20px}
.pl-item-title{font-size:.88rem;font-weight:600;flex:1}
.pl-add-wrap{padding:12px 20px 0;display:flex;gap:8px}
.pl-input{flex:1;background:#0a0a14;border:1px solid #2a2a3d;color:#fff;padding:9px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;outline:none;-webkit-user-select:text;user-select:text}
.pl-input:focus{border-color:var(--accent2)}
.pl-input::placeholder{color:rgba(255,255,255,.2)}
.pl-add-btn{background:rgba(124,58,237,.3);border:1px solid var(--accent2);color:#a78bfa;padding:9px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="bg-image"></div>
<div id="bg-overlay"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-band">Equalizer Music Band</div>
    <div class="login-sub">lyrics runner</div>
    <button class="btn-google" id="google-login-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="login-divider">or</div>
    <div style="width:100%;display:flex;flex-direction:column;gap:10px">
      <div><div class="login-label">Email</div><input class="login-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email"></div>
      <div><div class="login-label">Password</div><input class="login-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-email-login" id="email-login-btn">Sign In</button>
      <div class="login-toggle">No account? <span id="toggle-link">Create one</span></div>
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting">
  <div class="wait-band">Equalizer Music Band</div>
  <div class="wait-sub">lyrics runner</div>
  <div class="wait-text">Waiting for host to go live…</div>
  <div class="conn-badge" id="conn-badge">Connecting…</div>
  <div class="user-chip" id="user-chip" onclick="signOutUser()">
    <span id="user-name">—</span>
    <span style="color:rgba(255,60,90,.5);font-size:.65rem">Sign out</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="live-dot" id="live-dot"></div>
  <div class="song-bar" id="song-bar">
    <div>
      <div class="song-title" id="info-title"></div>
      <div class="song-artist" id="info-artist"></div>
    </div>
    <div class="song-bar-right">
      <div class="verse-counter" id="verse-counter"></div>
    </div>
  </div>
  <div class="lyrics-area">
    <div class="lyrics-wrap in" id="lyrics-wrap"></div>
  </div>
  <div class="bottom-bar">
    <div class="bg-toggle">
      <div class="bg-opt active" style="background:#000" data-bg="#000"></div>
      <div class="bg-opt" style="background:#0a0020" data-bg="#0a0020"></div>
      <div class="bg-opt" style="background:#001a00" data-bg="#001a00"></div>
      <div class="bg-opt" style="background:#200000" data-bg="#200000"></div>
    </div>
    <div class="bottom-right">
      <button class="playlist-btn" id="playlist-btn">📋 Playlist</button>
      <div class="font-controls">
        <button class="font-btn" id="size-down">A−</button>
        <button class="font-btn" id="size-up">A+</button>
      </div>
    </div>
  </div>
  <div class="progress-bar" id="progress-bar"></div>
</div>

<!-- NOTE INPUT PANEL -->
<div id="note-panel">
  <div class="note-box">
    <div class="note-box-header">
      <div class="note-box-title">📝 Add Note</div>
      <button class="note-close" id="note-close">✕</button>
    </div>
    <div class="note-ref" id="note-ref">—</div>
    <textarea class="note-textarea" id="note-textarea" placeholder="Type your note here…&#10;Only you can see this 🔒"></textarea>
    <button class="note-save-btn" id="note-save-btn">Save Note</button>
  </div>
</div>

<!-- PLAYLIST PANEL -->
<div id="playlist-panel">
  <div class="playlist-box">
    <div class="playlist-header">
      <h3>📋 My Playlist</h3>
      <button class="pl-close" id="pl-close">✕</button>
    </div>
    <div class="playlist-list" id="playlist-list"></div>
    <div class="pl-add-wrap">
      <input class="pl-input" id="pl-input" placeholder="Add song title…">
      <button class="pl-add-btn" id="pl-add-btn">＋ Add</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyATlzx0mYrd61nTzfDMgLqaFoVgvwYlK-g",
  authDomain: "band-lyrics.firebaseapp.com",
  databaseURL: "https://band-lyrics-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "band-lyrics",
  storageBucket: "band-lyrics.firebasestorage.app",
  messagingSenderId: "999724754981",
  appId: "1:999724754981:web:df22db8aaa1bb0c992b7cc"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);
const $    = id => document.getElementById(id);

let sizeBoost    = 1.0;
let lastTs       = null;
let lastData     = null;
let currentUser  = null;
let isSignup     = false;
let activeNoteKey = '';   // Firebase key for note being edited
let activeNoteRef = '';   // display reference text
let verseNotes   = {};    // lineKey → noteText for current verse

// ── AUTH ──────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    $('login-screen').classList.add('hidden');
    $('user-name').textContent = user.displayName || user.email?.split('@')[0] || 'User';
    if (user.photoURL) {
      const img = document.createElement('img');
      img.src = user.photoURL;
      $('user-chip').insertBefore(img, $('user-chip').firstChild);
    }
    loadPlaylist();
    if (lastData) renderLyrics(lastData); // re-render with notes
  } else {
    currentUser = null;
    $('login-screen').classList.remove('hidden');
  }
});

$('google-login-btn').onclick = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { showLoginError(e.message); }
};

$('email-login-btn').onclick = async () => {
  const email = $('login-email').value.trim();
  const pass  = $('login-password').value;
  if (!email || !pass) { showLoginError('Please fill all fields'); return; }
  try {
    if (isSignup) await createUserWithEmailAndPassword(auth, email, pass);
    else          await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    const msgs = {
      'auth/user-not-found':'No account found. Create one!',
      'auth/wrong-password':'Wrong password.',
      'auth/email-already-in-use':'Email already registered.',
      'auth/weak-password':'Password must be 6+ characters.',
      'auth/invalid-email':'Invalid email.'
    };
    showLoginError(msgs[e.code] || e.message);
  }
};

[$('login-email'),$('login-password')].forEach(el =>
  el.addEventListener('keydown', e => { if(e.key==='Enter') $('email-login-btn').click(); })
);

$('toggle-link').onclick = () => {
  isSignup = !isSignup;
  $('email-login-btn').textContent = isSignup ? 'Create Account' : 'Sign In';
  $('toggle-link').textContent = isSignup ? 'Sign in instead' : 'Create one';
};

function showLoginError(msg) {
  $('login-error').textContent = msg;
  $('login-error').classList.add('show');
  setTimeout(() => $('login-error').classList.remove('show'), 3500);
}
window.signOutUser = () => { if(confirm('Sign out?')) signOut(auth); };

// ── CONNECTION ────────────────────────────────────────────
onValue(ref(db,'.info/connected'), snap => {
  const ok = snap.val();
  $('conn-badge').textContent = ok ? '🟢 Connected' : '🔴 Reconnecting…';
  $('conn-badge').className = 'conn-badge'+(ok?' ok':'');
});

// ── BG IMAGE ──────────────────────────────────────────────
onValue(ref(db,'bgImage'), snap => {
  const url = snap.val();
  $('bg-image').style.backgroundImage = url ? `url(${url})` : '';
  $('bg-image').style.opacity = url ? '1' : '0';
});

// ── LIVE LISTENER ─────────────────────────────────────────
onValue(ref(db,'live'), snap => {
  const data = snap.val();
  if (!data || data.ts === lastTs) return;
  lastTs = data.ts;
  if (data.type === 'clear') showWaiting();
  else if (data.type === 'verse') { lastData = data; showMain(); renderLyrics(data); }
});

// ── RENDER LYRICS ─────────────────────────────────────────
async function renderLyrics(data) {
  const wrap = $('lyrics-wrap');
  wrap.classList.add('out'); wrap.classList.remove('in');

  // Load notes for this verse
  verseNotes = {};
  if (currentUser) {
    const songKey = sanitizeKey(data.title || 'song');
    const notesSnap = await get(ref(db, `users/${currentUser.uid}/notes/${songKey}/${data.verseIdx}`));
    if (notesSnap.val()) verseNotes = notesSnap.val();
  }

  setTimeout(() => {
    const lines = data.text.split('\n');
    const songKey = sanitizeKey(data.title || 'song');

    wrap.innerHTML = lines.map((line, lineIdx) => {
      if (!line.trim()) return '<div class="lyric-line spacer"></div>';
      const noteKey  = `${songKey}_${data.verseIdx}_${lineIdx}`;
      const noteText = verseNotes[lineIdx] || null;
      const inlineNote = noteText
        ? `<div class="inline-note">
            <div class="inline-note-text">${escHtml(noteText)}</div>
            <button class="inline-note-del" data-key="${noteKey}" data-sidx="${data.verseIdx}" data-lidx="${lineIdx}" data-skey="${songKey}">🗑</button>
           </div>`
        : '';
      return `<div class="lyric-line-wrap" data-line="${lineIdx}" data-skey="${songKey}" data-vidx="${data.verseIdx}">
        <div class="lyric-line">${escHtml(line)}</div>
        ${inlineNote}
      </div>`;
    }).join('');

    // Tap line → open note panel
    wrap.querySelectorAll('.lyric-line-wrap').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.classList.contains('inline-note-del')) return;
        if (!currentUser) return;
        const lineIdx = +el.dataset.line;
        const skey    = el.dataset.skey;
        const vidx    = el.dataset.vidx;
        const lineText = el.querySelector('.lyric-line').textContent.trim();
        activeNoteKey = `users/${currentUser.uid}/notes/${skey}/${vidx}/${lineIdx}`;
        activeNoteRef = lineText.slice(0, 45) + (lineText.length > 45 ? '…' : '');
        $('note-ref').textContent = '"' + activeNoteRef + '"';
        $('note-textarea').value  = verseNotes[lineIdx] || '';
        $('note-panel').classList.add('open');
        setTimeout(() => $('note-textarea').focus(), 300);
      });
    });

    // Delete note buttons
    wrap.querySelectorAll('.inline-note-del').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const skey  = btn.dataset.skey;
        const sidx  = btn.dataset.sidx;
        const lidx  = +btn.dataset.lidx;
        if (!confirm('Delete this note?')) return;
        await set(ref(db, `users/${currentUser.uid}/notes/${skey}/${sidx}/${lidx}`), null);
        delete verseNotes[lidx];
        renderLyrics(data);
      });
    });

    $('info-title').textContent  = data.title  || '';
    $('info-artist').textContent = data.artist || '';
    $('song-bar').classList.add('show');
    $('verse-counter').textContent = `${data.verseIdx+1} / ${data.total}`;
    $('live-dot').classList.add('show');
    const pct = data.total>1 ? (data.verseIdx/(data.total-1))*100 : 100;
    $('progress-bar').style.width = pct+'%';

    autoFit(wrap);
    wrap.classList.remove('out'); wrap.classList.add('in');
  }, 200);
}

function sanitizeKey(str) {
  return str.replace(/[^a-zA-Z0-9]/g,'_').slice(0,40);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SAVE NOTE ─────────────────────────────────────────────
$('note-close').onclick  = () => $('note-panel').classList.remove('open');
$('note-save-btn').onclick = async () => {
  if (!currentUser || !activeNoteKey) return;
  const val = $('note-textarea').value.trim();
  await set(ref(db, activeNoteKey), val || null);
  $('note-panel').classList.remove('open');
  $('note-save-btn').textContent = '✅ Saved!';
  setTimeout(() => $('note-save-btn').textContent = 'Save Note', 1200);
  if (lastData) renderLyrics(lastData); // refresh inline notes
};

// ── AUTO FIT ──────────────────────────────────────────────
function autoFit(wrap) {
  const availH = window.innerHeight - ($('song-bar').offsetHeight||52) - (document.querySelector('.bottom-bar').offsetHeight||48) - 20;
  const availW = window.innerWidth - 40;
  const lines  = wrap.querySelectorAll('.lyric-line:not(.spacer)');
  const count  = Math.max(lines.length,1);
  let maxLen   = 0;
  lines.forEach(el => { if(el.textContent.length > maxLen) maxLen = el.textContent.length; });
  maxLen = Math.max(maxLen,1);
  let size = Math.min(availH/(count*1.5), availW/(maxLen*0.62), 72) * sizeBoost;
  size = Math.max(size,11);
  applySize(wrap, size);
  let t=0;
  while(wrap.scrollHeight > availH+2 && size>10 && t<50){ size-=1; applySize(wrap,size); t++; }
}
function applySize(wrap, size) {
  wrap.querySelectorAll('.lyric-line:not(.spacer)').forEach(el => {
    el.style.fontSize = size+'px'; el.style.lineHeight='1.4';
  });
}
$('size-up').onclick   = () => { sizeBoost=Math.min(2.0,sizeBoost+0.12); if(lastData) renderLyrics(lastData); };
$('size-down').onclick = () => { sizeBoost=Math.max(0.3,sizeBoost-0.12); if(lastData) renderLyrics(lastData); };
let rTimer;
window.addEventListener('resize',()=>{ clearTimeout(rTimer); rTimer=setTimeout(()=>{ if(lastData) renderLyrics(lastData); },150); });

// ── BG COLOR ──────────────────────────────────────────────
document.querySelectorAll('.bg-opt').forEach(el => {
  el.onclick = () => {
    const c=el.dataset.bg;
    document.body.style.background=c; $('waiting').style.background=c;
    document.querySelectorAll('.bg-opt').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
  };
});

// ── SHOW/HIDE ─────────────────────────────────────────────
function showMain()    { $('waiting').classList.add('hidden'); $('main').style.display='flex'; }
function showWaiting() { $('waiting').classList.remove('hidden'); $('main').style.display='none'; $('live-dot').classList.remove('show'); $('song-bar').classList.remove('show'); lastData=null; }

// ── PLAYLIST ──────────────────────────────────────────────
let myPlaylist = [];
function loadPlaylist() {
  if (!currentUser) return;
  onValue(ref(db,`users/${currentUser.uid}/playlist`), snap => {
    const data = snap.val();
    myPlaylist = data ? Object.values(data) : [];
    renderPlaylist();
  });
}
function renderPlaylist() {
  const list = $('playlist-list');
  if (!myPlaylist.length) { list.innerHTML='<div style="padding:20px;text-align:center;color:rgba(255,255,255,.2);font-size:.8rem">Add songs below 👇</div>'; return; }
  list.innerHTML = myPlaylist.map((item,i) => `
    <div class="pl-item">
      <span class="pl-item-num">${String(i+1).padStart(2,'0')}</span>
      <div style="flex:1"><div class="pl-item-title">${item.title}</div></div>
      <button onclick="removePL(${i})" style="background:none;border:none;color:rgba(255,60,90,.5);cursor:pointer;font-size:.9rem">✕</button>
    </div>`).join('');
}
$('playlist-btn').onclick = () => $('playlist-panel').classList.add('open');
$('pl-close').onclick     = () => $('playlist-panel').classList.remove('open');
$('pl-add-btn').onclick   = () => {
  const t=$('pl-input').value.trim(); if(!t||!currentUser) return;
  myPlaylist.push({title:t, addedAt:Date.now()});
  savePL(); $('pl-input').value='';
};
$('pl-input').addEventListener('keydown',e=>{ if(e.key==='Enter') $('pl-add-btn').click(); });
window.removePL = i => { myPlaylist.splice(i,1); savePL(); };
function savePL() {
  if(!currentUser) return;
  const d={}; myPlaylist.forEach((item,i)=>d[i]=item);
  set(ref(db,`users/${currentUser.uid}/playlist`), myPlaylist.length?d:null);
}
</script>
</body>
