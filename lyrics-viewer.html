<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>equalizer music band — Lyrics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;600&family=Noto+Sans+Sinhala:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#000; --text:#fff; --dim:rgba(255,255,255,.35);
    --accent:#ff3c5a; --accent2:#7c3aed;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ── BG IMAGE ── */
  #bg-image {
    position:fixed; inset:0;
    background-size:cover; background-position:center; background-repeat:no-repeat;
    z-index:0; opacity:0; transition:opacity .5s;
  }
  #bg-overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.75);
    z-index:1;
  }

  /* ── WAITING ── */
  #waiting {
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:12px;
    z-index:10;
    transition:opacity .4s;
    padding:24px;
  }
  #waiting.hidden { opacity:0; pointer-events:none; }

  .wait-band {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(1.6rem, 6vw, 3.2rem);
    letter-spacing:5px;
    background:linear-gradient(90deg,#ff3c5a,#c850c0,#4158d0);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    line-height:1.1;
  }
  .wait-sub {
    font-family:'Space Mono',monospace;
    font-size:clamp(.6rem, 1.8vw, .85rem);
    letter-spacing:5px; color:rgba(255,255,255,.2);
  }
  .wait-text {
    font-size:clamp(.75rem,2.5vw,.9rem);
    color:rgba(255,255,255,.25);
    animation:pulsing 2s infinite;
    margin-top:4px;
  }
  .conn-badge {
    font-size:.7rem; padding:4px 14px; border-radius:20px;
    background:rgba(255,255,255,.06); color:rgba(255,255,255,.3);
  }
  .conn-badge.ok { color:#00e676; background:rgba(0,230,118,.1); }
  @keyframes pulsing { 0%,100%{opacity:.2} 50%{opacity:.6} }

  /* ── MAIN ── */
  #main {
    position:fixed; inset:0;
    display:none; flex-direction:column;
    z-index:2;
  }

  /* Song info bar */
  .song-bar {
    flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
    padding: max(12px, env(safe-area-inset-top, 12px)) 20px 10px;
    opacity:0; transition:opacity .4s;
    min-height:52px;
  }
  .song-bar.show { opacity:1; }
  .song-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(.9rem,3.5vw,1.3rem);
    letter-spacing:2px; color:var(--accent);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:60vw;
  }
  .song-artist { font-size:clamp(.6rem,2vw,.75rem); color:var(--dim); margin-top:1px; }
  .verse-counter { font-size:clamp(.6rem,2vw,.75rem); color:var(--dim); white-space:nowrap; }

  /* Lyrics area — fills remaining space */
  .lyrics-area {
    flex:1;
    display:flex; align-items:center; justify-content:flex-start;
    padding:8px 24px 8px;
    overflow:hidden;
    position:relative;
  }

  .lyrics-wrap {
    width:100%;
    transition:opacity .22s, transform .28s;
    overflow:hidden;
  }
  .lyrics-wrap.out { opacity:0; transform:translateY(-8px); }
  .lyrics-wrap.in  { opacity:1; transform:translateY(0); }

  .lyric-line {
    display:block;
    font-family:'Space Mono','Courier New',monospace;
    font-weight:500;
    line-height:1.4;
    color:var(--text);
    text-shadow:0 1px 12px rgba(0,0,0,.8);
    /* KEY: wrap long lines but keep relative spacing */
    white-space:pre-wrap;
    word-break:break-word;
    overflow-wrap:break-word;
  }
  .lyric-line.chord {
    color:var(--accent);
    font-weight:700;
    opacity:.95;
  }
  .lyric-line.lbl {
    color:var(--accent2);
    letter-spacing:3px;
    margin-bottom:6px;
    margin-top:8px;
    font-family:'Bebas Neue',sans-serif;
    white-space:pre-wrap;
  }
  .lyric-line.chord + .lyric-line:not(.chord):not(.lbl) {
    margin-bottom:8px;
  }

  /* Live dot */
  .live-dot {
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    width:7px; height:7px; border-radius:50%;
    background:var(--accent); opacity:0;
    animation:livepulse 1.5s infinite; transition:opacity .3s;
  }
  .live-dot.show { opacity:1; }
  @keyframes livepulse {
    0%,100%{box-shadow:0 0 0 0 rgba(255,60,90,.6)}
    50%{box-shadow:0 0 0 5px rgba(255,60,90,0)}
  }

  /* Bottom bar */
  .bottom-bar {
    flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 16px max(8px, env(safe-area-inset-bottom, 8px));
    min-height:48px;
  }
  .font-controls { display:flex; gap:8px; }
  .font-btn {
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:var(--text); width:36px; height:36px;
    border-radius:50%; font-size:.85rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    -webkit-appearance:none;
  }
  .font-btn:active { background:rgba(255,255,255,.25); }
  .bg-toggle { display:flex; gap:8px; align-items:center; }
  .bg-opt {
    width:24px; height:24px; border-radius:50%;
    cursor:pointer; border:2px solid transparent;
    transition:border-color .15s;
  }
  .bg-opt.active { border-color:var(--accent); }

  /* Progress bar */
  .progress-bar {
    position:fixed; bottom:0; left:0;
    height:3px; background:var(--accent);
    transition:width .4s ease; width:0;
    z-index:20;
  }
</style>
</head>
<body>

<div id="bg-image"></div>
<div id="bg-overlay"></div>

<!-- WAITING SCREEN -->
<div id="waiting">
  <div class="wait-band">Equalizer Music Band</div>
  <div class="wait-sub">lyrics runner</div>
  <div class="wait-text">Waiting for host to go live…</div>
  <div class="conn-badge" id="conn-badge">Connecting…</div>
</div>

<!-- MAIN SCREEN -->
<div id="main">
  <div class="live-dot" id="live-dot"></div>

  <div class="song-bar" id="song-bar">
    <div>
      <div class="song-title" id="info-title"></div>
      <div class="song-artist" id="info-artist"></div>
    </div>
    <div class="verse-counter" id="verse-counter"></div>
  </div>

  <div class="lyrics-area">
    <div class="lyrics-wrap in" id="lyrics-wrap"></div>
  </div>

  <div class="bottom-bar">
    <div class="bg-toggle">
      <div class="bg-opt active" style="background:#000"    data-bg="#000"></div>
      <div class="bg-opt"        style="background:#0a0020" data-bg="#0a0020"></div>
      <div class="bg-opt"        style="background:#001a00" data-bg="#001a00"></div>
      <div class="bg-opt"        style="background:#200000" data-bg="#200000"></div>
    </div>
    <div class="font-controls">
      <button class="font-btn" id="size-down">A−</button>
      <button class="font-btn" id="size-up">A+</button>
    </div>
  </div>

  <div class="progress-bar" id="progress-bar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyATlzx0mYrd61nTzfDMgLqaFoVgvwYlK-g",
  authDomain: "band-lyrics.firebaseapp.com",
  databaseURL: "https://band-lyrics-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "band-lyrics",
  storageBucket: "band-lyrics.firebasestorage.app",
  messagingSenderId: "999724754981",
  appId: "1:999724754981:web:df22db8aaa1bb0c992b7cc"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const $   = id => document.getElementById(id);

let sizeBoost = 1.0;
let lastTs    = null;
let lastData  = null;

// ── CONNECTION ──────────────────────────────────────────
onValue(ref(db, '.info/connected'), snap => {
  const ok = snap.val();
  const b  = $('conn-badge');
  b.textContent = ok ? '🟢 Connected' : '🔴 Reconnecting…';
  b.className   = 'conn-badge' + (ok ? ' ok' : '');
});

// ── BG IMAGE ────────────────────────────────────────────
onValue(ref(db, 'bgImage'), snap => {
  const url = snap.val();
  const bg  = $('bg-image');
  if (url) {
    bg.style.backgroundImage = `url(${url})`;
    bg.style.opacity = '1';
  } else {
    bg.style.backgroundImage = '';
    bg.style.opacity = '0';
  }
});

// ── MP3 AUDIO ───────────────────────────────────────────
let viewerAudio = null;
onValue(ref(db, 'mp3Data'), snap => {
  const data = snap.val();
  if (!data) {
    if (viewerAudio) { viewerAudio.pause(); viewerAudio = null; }
  }
  // Don't auto-play — viewer manually plays if needed
});

// ── LIVE LYRICS ─────────────────────────────────────────
onValue(ref(db, 'live'), snap => {
  const data = snap.val();
  if (!data || data.ts === lastTs) return;
  lastTs = data.ts;
  if (data.type === 'clear') {
    showWaiting();
  } else if (data.type === 'verse') {
    lastData = data;
    showMain();
    renderLyrics(data);
  }
});

// ── RENDER LYRICS ────────────────────────────────────────
function renderLyrics(data) {
  const wrap = $('lyrics-wrap');
  wrap.classList.add('out');
  wrap.classList.remove('in');

  setTimeout(() => {
    const lines = data.text.split('\n');

    wrap.innerHTML = lines.map(line => {
      const t = line.trim();
      if (!t) return '<div class="lyric-line" style="height:.4em"></div>';
      const isLbl   = /^(verse|chorus|bridge|outro|intro|pre|hook)/i.test(t) && t.length < 35;
      const isChord = !isLbl && /^[A-G][#b]?m?\s/.test(t) && t.length < 50 && !/[a-z]{5,}/.test(t);
      const cls = isLbl ? 'lbl' : isChord ? 'chord' : '';
      return `<div class="lyric-line ${cls}">${escHtml(line)}</div>`;
    }).join('');

    // Update info
    $('info-title').textContent  = data.title  || '';
    $('info-artist').textContent = data.artist || '';
    $('song-bar').classList.add('show');
    $('verse-counter').textContent = `${data.verseIdx + 1} / ${data.total}`;
    $('live-dot').classList.add('show');

    const pct = data.total > 1 ? (data.verseIdx / (data.total - 1)) * 100 : 100;
    $('progress-bar').style.width = pct + '%';

    // Auto-fit font size to screen
    autoFit(wrap);

    wrap.classList.remove('out');
    wrap.classList.add('in');
  }, 200);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── AUTO FIT ──────────────────────────────────────────────
function autoFit(wrap) {
  // Available space
  const songBar   = $('song-bar');
  const bottomBar = document.querySelector('.bottom-bar');
  const totalH    = window.innerHeight;
  const usedH     = (songBar.offsetHeight || 52) + (bottomBar.offsetHeight || 48) + 24;
  const availH    = totalH - usedH;
  const availW    = window.innerWidth - 48;

  const allLines    = wrap.querySelectorAll('.lyric-line:not(.lbl)');
  const normalLines = wrap.querySelectorAll('.lyric-line:not(.lbl):not(.chord)');
  const lineCount   = Math.max(normalLines.length, 1);

  // Find the longest line to base width-fitting on
  let maxLen = 0;
  normalLines.forEach(el => { if (el.textContent.length > maxLen) maxLen = el.textContent.length; });
  maxLen = Math.max(maxLen, 1);

  // Estimate size from height and width
  const sizeByH = availH / (lineCount * 1.5);
  const sizeByW = availW / (maxLen * 0.62); // Space Mono char ratio ~0.62
  let size = Math.min(sizeByH, sizeByW, 72) * sizeBoost;
  size = Math.max(size, 11);

  applySize(wrap, size);

  // Fine-tune: shrink if overflow
  let tries = 0;
  while (wrap.scrollHeight > availH + 2 && size > 10 && tries < 50) {
    size -= 1;
    applySize(wrap, size);
    tries++;
  }
}

function applySize(wrap, size) {
  wrap.querySelectorAll('.lyric-line:not(.lbl):not(.chord)').forEach(el => {
    el.style.fontSize   = size + 'px';
    el.style.lineHeight = '1.4';
  });
  wrap.querySelectorAll('.lyric-line.chord').forEach(el => {
    el.style.fontSize   = Math.max(10, size * 0.7) + 'px';
    el.style.lineHeight = '1.25';
  });
  wrap.querySelectorAll('.lyric-line.lbl').forEach(el => {
    el.style.fontSize   = Math.max(11, size * 0.45) + 'px';
    el.style.lineHeight = '1.2';
  });
}

// ── A+ / A- ──────────────────────────────────────────────
$('size-up').onclick   = () => { sizeBoost = Math.min(2.0, sizeBoost + 0.12); if (lastData) renderLyrics(lastData); };
$('size-down').onclick = () => { sizeBoost = Math.max(0.3, sizeBoost - 0.12); if (lastData) renderLyrics(lastData); };

// ── RESIZE / ROTATE ──────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (lastData) renderLyrics(lastData); }, 150);
});

// ── BACKGROUND ───────────────────────────────────────────
document.querySelectorAll('.bg-opt').forEach(el => {
  el.onclick = () => {
    const c = el.dataset.bg;
    document.body.style.background = c;
    $('waiting').style.background  = c;
    document.querySelectorAll('.bg-opt').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
  };
});

// ── SHOW/HIDE ─────────────────────────────────────────────
function showMain() {
  $('waiting').classList.add('hidden');
  $('main').style.display = 'flex';
}
function showWaiting() {
  $('waiting').classList.remove('hidden');
  $('main').style.display = 'none';
  $('live-dot').classList.remove('show');
  $('song-bar').classList.remove('show');
  lastData = null;
}
</script>
</body>
</html>
